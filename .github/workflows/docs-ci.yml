name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'

jobs:
  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --no-progress
            'docs/**/*.md'
            '*.md'
          fail: true
