name: CI

# Workflow runs on every PR and push to main, regardless of which paths
# changed. The `changes` job detects whether any non-doc files were
# touched; the `lint` and `test` jobs are gated at the job level on that
# output and skip entirely on docs-only changes — services and all.
#
# GitHub treats a skipped job's check_run as a passing required status
# check, so branch protection accepts the skipped state. Workflow-level
# `paths-ignore` does NOT have this property: a path-skipped workflow
# posts no commit status at all and leaves required checks hanging
# forever, which is what blocked docs-only PRs before this structure.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gnp
          POSTGRES_PASSWORD: gnp_secret
          POSTGRES_DB: gnp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      memgraph:
        image: memgraph/memgraph:latest
        ports:
          - 7687:7687
    env:
      DATABASE_URL: postgres://gnp:gnp_secret@localhost:5432/gnp_db
      MEMGRAPH_HOST: localhost
      MEMGRAPH_PORT: 7687
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres
      - name: Run migrations
        run: sqlx migrate run --source migrations
      - name: Run tests
        run: cargo test --all
