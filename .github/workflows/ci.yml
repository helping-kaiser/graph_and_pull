name: CI

# Workflow runs on every PR and push to main, regardless of which paths
# changed. The expensive lint/test steps inside each job are gated on
# whether non-doc files changed, via the `changes` job below.
#
# Why not `paths-ignore` at the workflow level: GitHub's branch-protection
# required-checks logic doesn't treat a path-skipped workflow as success —
# it expects a posted commit status with the matching context name and
# blocks the PR forever when none arrives. Keeping the workflow itself
# always-on, with conditional steps, lets the `Lint` and `Test` jobs
# always report success while still avoiding the costly Rust steps on
# docs-only changes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  lint:
    name: Lint
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.code != 'true'
        name: Skip — docs-only change
        run: echo "No code files changed; skipping rustfmt and clippy."
      - if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - if: needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
      - if: needs.changes.outputs.code == 'true'
        name: Check formatting
        run: cargo fmt --all -- --check
      - if: needs.changes.outputs.code == 'true'
        name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: changes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gnp
          POSTGRES_PASSWORD: gnp_secret
          POSTGRES_DB: gnp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      memgraph:
        image: memgraph/memgraph:latest
        ports:
          - 7687:7687
    env:
      DATABASE_URL: postgres://gnp:gnp_secret@localhost:5432/gnp_db
      MEMGRAPH_HOST: localhost
      MEMGRAPH_PORT: 7687
      RUST_LOG: debug
    steps:
      - if: needs.changes.outputs.code != 'true'
        name: Skip — docs-only change
        run: echo "No code files changed; skipping migrations and cargo test."
      - if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: needs.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
      - if: needs.changes.outputs.code == 'true'
        name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres
      - if: needs.changes.outputs.code == 'true'
        name: Run migrations
        run: sqlx migrate run --source migrations
      - if: needs.changes.outputs.code == 'true'
        name: Run tests
        run: cargo test --all
